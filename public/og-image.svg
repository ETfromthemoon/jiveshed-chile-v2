<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="JiveShed — From attention to action.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E0E12"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.28" cy="0.28" r="0.7">
      <stop offset="0" stop-color="#1B4DFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1B4DFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- eyebrow -->
  <text x="90" y="150" fill="#FF6B3D" font-family="'Space Mono', monospace" font-size="24" letter-spacing="6" font-weight="700">AI-INTEGRATED GROWTH EXPERIENCE AGENCY · CHILE</text>

  <!-- wordmark -->
  <text x="86" y="320" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="170" font-weight="900" letter-spacing="-6">JiveShed</text>

  <!-- coral rule -->
  <rect x="92" y="360" width="180" height="6" fill="#FF6B3D"/>

  <!-- tagline -->
  <text x="90" y="450" fill="#F5F2EC" font-family="Georgia, 'Crimson Text', serif" font-style="italic" font-size="56">From attention to action.</text>

  <!-- supporting line -->
  <text x="90" y="520" fill="rgba(255,255,255,0.65)" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="400">Social · WhatsApp · Google · Ads · CRM · Retention — one growth system.</text>

  <!-- contact -->
  <text x="90" y="588" fill="rgba(255,255,255,0.5)" font-family="'Space Mono', monospace" font-size="22" letter-spacing="3">hello@jiveshed.com</text>
</svg>
